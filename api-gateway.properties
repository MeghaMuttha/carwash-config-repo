# Server Port
server.port=8080

# Eureka Registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- SPRING CLOUD GATEWAY ROUTES ---

# 1. User Service
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# 2. Car Service
spring.cloud.gateway.routes[1].id=car-service
spring.cloud.gateway.routes[1].uri=lb://car-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/cars/**

# 3. Wash Service
spring.cloud.gateway.routes[2].id=wash-service
spring.cloud.gateway.routes[2].uri=lb://wash-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/wash/**

# 4. Assignment Service
spring.cloud.gateway.routes[3].id=washer-assignment-service
spring.cloud.gateway.routes[3].uri=lb://washer-assignment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/assign/**

# 5. Notification Service
spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://notification-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/notifications/**

# 6. Payment Service
spring.cloud.gateway.routes[5].id=payment-service
spring.cloud.gateway.routes[5].uri=lb://payment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/payments/**

# --- LOGGING (Optional but helpful for debugging) ---
logging.level.org.springframework.cloud.gateway=DEBUG
